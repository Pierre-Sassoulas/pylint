name: Prepare a release

# Manually triggered workflow that performs the version bump and opens the
# release pull request, so a maintainer no longer has to run ``tbump`` locally.
#
# Run it from the branch the release is cut from:
#   * a minor/major release: run from ``main`` and set ``next_dev_version`` so
#     ``main`` is bumped to the next dev version in the same pull request;
#   * a patch release: run from the ``maintenance/X.Y.x`` branch and leave
#     ``next_dev_version`` empty.
#
# After the pull request is merged, push the ``vX.Y.Z`` tag on the merge commit
# to trigger ``release-publish.yml`` (GitHub release) and ``release.yml`` (PyPI).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 4.2.0 or 4.0.6"
        required: true
        type: string
      next_dev_version:
        description: >-
          Minor/major only: dev version to bump main to afterwards (e.g. 4.3.0-dev0).
          Leave empty for a patch release.
        required: false
        type: string

env:
  DEFAULT_PYTHON: "3.14"

permissions:
  contents: read

jobs:
  prepare-release:
    name: Bump version and open the release pull request
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token for the pylint bot
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.BACKPORT_CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          permission-contents: write # push the release branch
          permission-pull-requests: write # open the release pull request
      - name: Check out code from GitHub
        uses: actions/checkout@v6.0.3
        with:
          # Full history so tbump can operate and the PR diff is correct.
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up Python ${{ env.DEFAULT_PYTHON }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}
          check-latest: true
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt -r doc/requirements.txt
      - name: Configure git as the pylint bot
        run: |
          git config user.name "${{ vars.BACKPORT_USER_NAME }}"
          git config user.email "${{ vars.BACKPORT_USER_EMAIL }}"
      - name: Create the release branch
        run: git switch -c "release-${{ inputs.version }}"
      - name: Bump the version and build the changelog
        run: tbump "${{ inputs.version }}" --no-push --no-tag --non-interactive
      - name: Bump main to the next dev version
        if: inputs.next_dev_version != ''
        run: tbump "${{ inputs.next_dev_version }}" --no-push --no-tag --non-interactive
      - name: Push the release branch
        run: git push --force-with-lease origin "release-${{ inputs.version }}"
      - name: Open the release pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "release-${{ inputs.version }}" \
            --title "Release ${{ inputs.version }}" \
            --body "Automated release preparation for \`${{ inputs.version }}\`.

          Generated by the \`release-prepare\` workflow. Review the version bump
          and changelog, merge, then push the \`v${{ inputs.version }}\` tag on
          the merge commit to publish to PyPI.

          See \`doc/development_guide/contributor_guide/release.rst\`."
